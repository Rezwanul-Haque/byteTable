name: Release

# Builds signed installers + updater artifacts for all three desktop OSes and
# publishes them (plus the `latest.json` the in-app updater reads) to a SINGLE
# GitHub release, on every `v*` tag push.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          prev=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then range="${prev}..${TAG}"; else range="${TAG}"; fi
          echo "Changelog range: ${range:-<all>}"

          added=""; improved=""; fixed=""; other=""
          while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            type=$(printf '%s' "$subject" | sed -nE 's/^([a-zA-Z]+)(\([^)]*\))?!?:.*/\1/p' | tr '[:upper:]' '[:lower:]')
            msg=$(printf '%s' "$subject" | sed -E 's/^[a-zA-Z]+(\([^)]*\))?!?:[[:space:]]*//')
            line="- ${msg}"$'\n'
            case "$type" in
              feat) added="${added}${line}" ;;
              improv|improvement|refactor|perf) improved="${improved}${line}" ;;
              fix|bugfix) fixed="${fixed}${line}" ;;
              chore|docs|doc|test|tests|ci|build|style|release) : ;;
              *) other="${other}${line}" ;;
            esac
          done < <(git log --no-merges --pretty=format:'%s' "$range")

          body="## What's changed"$'\n'
          [ -n "$added" ]    && body="${body}"$'\n'"### Added"$'\n'"${added}"
          [ -n "$improved" ] && body="${body}"$'\n'"### Improvements"$'\n'"${improved}"
          [ -n "$fixed" ]    && body="${body}"$'\n'"### Fixes"$'\n'"${fixed}"
          [ -n "$other" ]    && body="${body}"$'\n'"### Other"$'\n'"${other}"
          if [ -z "${added}${improved}${fixed}${other}" ]; then
            body="${body}"$'\n'"_No notable changes._"$'\n'
          fi
          body="${body}"$'\n'"---"$'\n'"Download the installer for your OS below. The app also self-updates from this release."

          {
            echo "body<<__NOTES_EOF__"
            printf '%s\n' "$body"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create the draft release
        id: create
        uses: actions/github-script@v8
        env:
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const tag = process.env.TAG;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ByteTable ${tag}`,
              body: process.env.NOTES,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            target: ""
          - platform: ubuntu-22.04
            args: ""
            target: ""
          # Corrected: Only packages into .deb to avoid executing ARM64 dependencies on an x86 host
          - platform: ubuntu-22.04
            args: "--target aarch64-unknown-linux-gnu --bundles deb,rpm"
            target: "aarch64-unknown-linux-gnu"
          - platform: windows-latest
            args: ""
            target: ""
          - platform: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Stamp version from the tag
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const tc = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(tc, 'utf8'));
            conf.version = version;
            fs.writeFileSync(tc, JSON.stringify(conf, null, 2) + '\n');
            const ct = 'src-tauri/Cargo.toml';
            const cargo = fs.readFileSync(ct, 'utf8').replace(/^version = ".*"/m, `version = "${version}"`);
            fs.writeFileSync(ct, cargo);
            console.log('Stamped version ' + version);

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            # 1. Register ARM64 architecture on this x86_64 host
            sudo dpkg --add-architecture arm64

            # 2. Force existing standard repositories to ONLY look for amd64 binaries
            sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
            sudo sed -i 's/deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list

            # 3. Append the correct arm64 ubuntu-ports repositories
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list

            sudo apt-get update

            # 4. Download the actual ARM64 libraries needed by Tauri
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
              libwebkit2gtk-4.1-dev:arm64 \
              libssl-dev:arm64 \
              libayatana-appindicator3-dev:arm64 \
              librsvg2-dev:arm64 \
              libxdo-dev:arm64

            # 5. Route environment variables to use the arm64 pkg-config files
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and upload into the shared release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Generate + attach SHA-256 checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir dist && cd dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*' --dir .
          sha256sum * > SHASUMS256.txt
          gh release upload "$TAG" SHASUMS256.txt --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish the release (flip draft → latest)
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              make_latest: "true",
            });
