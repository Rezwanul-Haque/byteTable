name: Release

# Builds signed installers + updater artifacts for all three desktop OSes and
# publishes them (plus the `latest.json` the in-app updater reads) to a SINGLE
# GitHub release, on every `v*` tag push.
#
# Why three jobs: a build matrix that each call tauri-action with only `tagName`
# races to create its OWN release (duplicate drafts, split assets). Instead we
# create ONE draft release up front, have every platform upload into it by
# `releaseId`, then publish it once all builds finish.
#
# Required repo secrets (see docs/AUTO_UPDATE.md):
#   TAURI_SIGNING_PRIVATE_KEY           — the updater private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — its password
# And tauri.conf.json → plugins.updater.pubkey must hold the matching public key.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    # Gate 1 — never run on forks. Tags are branch-agnostic refs, so a fork that
    # syncs upstream history (and its `v*` tags) would otherwise trigger the full
    # matrix build. Restrict the whole release flow to the canonical repo.
    if: github.repository == 'Rezwanul-Haque/byteTable'
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      # The generated changelog — passed to tauri-action so it stamps the same
      # notes into latest.json (updater manifest), not just the GitHub release
      # body. Without this, latest.json.notes is "" and the update modal's
      # "What's New" renders empty.
      notes: ${{ steps.notes.outputs.body }}
    steps:
      # Full history + tags so the changelog step can diff the previous tag.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Gate 2 — the tagged commit must be reachable from `main`. `main` is the
      # stable branch that takes production PRs from `dev`; a `v*` tag on a `dev`
      # or feature commit must NOT publish a release. We verify ancestry directly
      # instead of trusting `github.event.base_ref` (often null on tag pushes, so
      # a real release could silently skip). Fail here → build/publish never run.
      - name: Verify tag is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not on main. Release skipped."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} is on main — proceeding."

      # Build grouped release notes from the conventional-commit subjects between
      # the previous tag and this one:
      #   feat:                 → Added
      #   improv: / refactor: / perf:  → Improvements
      #   fix:                  → Fixes
      #   anything else (minus chore/docs/test/ci/build/style noise) → Other
      # A commit's `type(scope):` prefix is stripped; empty sections are dropped.
      - name: Build release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          prev=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then range="${prev}..${TAG}"; else range="${TAG}"; fi
          echo "Changelog range: ${range:-<all>}"

          added=""; improved=""; fixed=""; other=""
          while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            # Drop release version-bump commits — including legacy/hand-formatted
            # subjects like "Release v0.1.2" that carry no conventional type: prefix
            # (those would otherwise fall through to the "Other" bucket).
            case "$subject" in
              [Rr]elease\ v[0-9]*) continue ;;
            esac
            # type token = leading letters before an optional (scope) and the colon
            type=$(printf '%s' "$subject" | sed -nE 's/^([a-zA-Z]+)(\([^)]*\))?!?:.*/\1/p' | tr '[:upper:]' '[:lower:]')
            msg=$(printf '%s' "$subject" | sed -E 's/^[a-zA-Z]+(\([^)]*\))?!?:[[:space:]]*//')
            line="- ${msg}"$'\n'
            case "$type" in
              feat) added="${added}${line}" ;;
              improv|improvement|refactor|perf) improved="${improved}${line}" ;;
              fix|bugfix) fixed="${fixed}${line}" ;;
              chore|docs|doc|test|tests|ci|build|style|release) : ;;
              *) other="${other}${line}" ;;
            esac
          done < <(git log --no-merges --pretty=tformat:'%s' "$range")

          body="## What's changed"$'\n'
          [ -n "$added" ]    && body="${body}"$'\n'"### Added"$'\n'"${added}"
          [ -n "$improved" ] && body="${body}"$'\n'"### Improvements"$'\n'"${improved}"
          [ -n "$fixed" ]    && body="${body}"$'\n'"### Fixes"$'\n'"${fixed}"
          [ -n "$other" ]    && body="${body}"$'\n'"### Other"$'\n'"${other}"
          if [ -z "${added}${improved}${fixed}${other}" ]; then
            body="${body}"$'\n'"_No notable changes._"$'\n'
          fi

          # `body` = the changelog only → goes into latest.json.notes (the in-app
          # update modal's "What's New"). `full` appends the download/self-update
          # footer for the GitHub release PAGE, where that line is useful; it would
          # be noise inside the app, so the updater gets `body` without it.
          full="${body}"$'\n'"---"$'\n'"Download the installer for your OS below. The app also self-updates from this release."

          {
            echo "body<<__NOTES_EOF__"
            printf '%s\n' "$body"
            echo "__NOTES_EOF__"
            echo "full<<__FULL_EOF__"
            printf '%s\n' "$full"
            echo "__FULL_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create the draft release
        id: create
        uses: actions/github-script@v8
        env:
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.full }}
        with:
          script: |
            const tag = process.env.TAG;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ByteTable ${tag}`,
              body: process.env.NOTES,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: ubuntu-22.04-arm
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      # The git tag is the source of truth for the version. Stamp it into the
      # manifests so the built app's getVersion() + bundle names + updater
      # latest.json all match the tag (committed manifest values are only a dev
      # baseline). Uses github-script for cross-platform file edits (no sed).
      - name: Stamp version from the tag
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            const tc = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(tc, 'utf8'));
            conf.version = version;
            fs.writeFileSync(tc, JSON.stringify(conf, null, 2) + '\n');
            const ct = 'src-tauri/Cargo.toml';
            const cargo = fs.readFileSync(ct, 'utf8').replace(/^version = ".*"/m, `version = "${version}"`);
            fs.writeFileSync(ct, cargo);
            console.log('Stamped version ' + version);

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and upload into the shared release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Stamps latest.json.notes (updater manifest) with the changelog so the
          # in-app update modal's "What's New" is populated. Same body already on
          # the GitHub release; every matrix job passes the identical string.
          releaseBody: ${{ needs.create-release.outputs.notes }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      # Hash every uploaded asset into a single SHASUMS256.txt (sha256sum
      # format: "<hash>  <filename>") and attach it. The install scripts verify
      # their download against it.
      - name: Generate + attach SHA-256 checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir dist && cd dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*' --dir .
          sha256sum * > SHASUMS256.txt
          gh release upload "$TAG" SHASUMS256.txt --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish the release (flip draft → latest)
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              make_latest: "true",
            });
