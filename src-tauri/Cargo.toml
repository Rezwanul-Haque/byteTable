[package]
name = "bytetable"
version = "0.0.19"
description = "A free open-source local-first desktop database client"
authors = ["ByteTable contributors"]
edition = "2021"
# Bumped from 1.77.2 in M17: the AWS SDK (DynamoDB engine) raises the effective
# MSRV. Paired with `.cargo/config.toml`'s `resolver.incompatible-rust-versions
# = "fallback"`, this makes cargo pick the newest aws-sdk/â€‹smithy crates that
# still support 1.89 (rather than the 1.91-MSRV latest), keeping the build green
# on the installed toolchain.
rust-version = "1.89"
license = "Apache-2.0"

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "bytetable_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tauri-plugin-opener = "2.5.4"
tauri-plugin-dialog = "2.7.1"
# In-app auto-updater: checks the GitHub release `latest.json`, downloads the
# signed artifact for the current OS, installs it, and relaunches (via the
# process plugin). Desktop-only.
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
# Single-instance guard: a second launch (e.g. double-clicking the AppImage)
# focuses the running window instead of spawning another process. Desktop-only.
tauri-plugin-single-instance = "2"
async-trait = "0.1.89"
uuid = { version = "1.20.0", features = ["v4", "serde"] }
# `net` + `io-util` + `time` are added in M12 Task 3 for the SSH tunnel
# (`TcpListener`/`TcpStream`, `copy_bidirectional`, connect timeouts); russh
# also drives I/O on this runtime.
tokio = { version = "1.52.3", features = ["sync", "rt", "net", "io-util", "time", "macros"] }
rusqlite = { version = "0.37", features = ["bundled", "column_decltype"] }
# Async-native driver for the server engines (M12). `runtime-tokio` matches
# Tauri's tokio runtime, so the async EngineConnection methods await the pool
# directly â€” no spawn_blocking, unlike the rusqlite adapter. `tls-rustls` is a
# pure-Rust TLS stack (no OpenSSL system dependency). Pinned to the 0.8 line:
# stable, MSRV well below rustc 1.89, and compatible with the tokio 1.52 already
# in the tree. M12 Task 1 added `postgres`; Task 2 adds `mysql` (the MySQL
# adapter `engines::mysql`, mirroring the Postgres one).
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
    "mysql",
    # NUMERIC/DECIMAL arrive over the wire in a binary format sqlx cannot decode
    # to a primitive; `bigdecimal` lets us decode to an arbitrary-precision
    # `BigDecimal` and stringify it without precision loss (the CellValue
    # precision contract â€” see the adapter's `decode_value`).
    "bigdecimal",
] }
# DATE/DATETIME/TIMESTAMP/TIME come over the binary protocol as temporal values,
# not strings â€” without chrono Decode impls sqlx returns them as NULL (the
# "timestamps don't show" bug). We enable `chrono` on the MySQL + Postgres
# sub-crates directly (same crate instances the facade uses; additive) rather
# than via the facade `chrono` feature, because that feature's
# `sqlx-sqlite?/chrono` line drags in `sqlx-sqlite`, which conflicts with our
# `rusqlite` (both link the native `sqlite3`). The sub-crate `chrono` feature
# transitively enables `sqlx-core/chrono`, so `sqlx::types::chrono` is available.
sqlx-mysql = { version = "=0.8.6", default-features = false, features = ["chrono"] }
sqlx-postgres = { version = "=0.8.6", default-features = false, features = ["chrono"] }
# Used by the schema_map slice to decode base64 PNG export bytes received over
# IPC (base64 is ~1.33Ă— the raw size vs. ~10Ă— for a JSON number array).
base64 = "0.22"
# OS keychain for server-connection secrets (M12 Task 3): the database password
# and the SSH password/key-passphrase are stored here keyed by the saved
# connection id, never in the JSON registry. `apple-native` uses the macOS
# Keychain Services; `windows-native` / `sync-secret-service` cover the other
# desktop targets ByteTable ships to. Behind the `SecretStore` port so the
# orchestration is unit-testable with an in-memory fake (mirrors the repository
# pattern).
keyring = { version = "3", features = [
    "apple-native",
    "windows-native",
    "sync-secret-service",
] }
# Pure-Rust async SSH client for the M12 Task 3 tunnel (local listener â†’ SSH
# `direct-tcpip` channel â†’ bastion â†’ db host:port). Chosen over `ssh2`/libssh2
# deliberately: russh needs no system OpenSSL/libssh2 (matching the `tls-rustls`
# choice for sqlx), is async-native on the tokio runtime already in the tree,
# and cross-compiles cleanly for the release profile. Key handling (load a
# private key from disk, decrypt a passphrase-protected key, talk to the
# ssh-agent) lives in the re-exported `russh::keys` module.
russh = "0.61"
# Redis driver for the M13 key-value engine. The `tokio-comp` feature drives
# the async multiplexed connection on the tokio runtime already in the tree
# (Tauri's runtime), so the async `KeyValueConnection` methods await the driver
# directly â€” no spawn_blocking, mirroring the sqlx adapters. `tls-rustls` +
# `tls-rustls-webpki-roots` give a pure-Rust TLS stack (no OpenSSL system
# dependency), matching the `tls-rustls` choice for sqlx and `russh`'s rustls;
# cargo unifies on the single rustls 0.23 already in the dependency tree.
# Pinned to the 0.27 line: it is async-native on tokio 1.x, builds on rustc
# 1.89 with an MSRV well below it, and is the last 0.x line before the 1.0
# rename â€” a conservative, widely-deployed choice consistent with the rest of
# the tree's "0.x, stable, rustls" driver picks.
redis = { version = "0.27", default-features = false, features = [
    "tokio-comp",
    "tokio-rustls-comp",
    "tls-rustls-webpki-roots",
    "keep-alive",
] }
# DynamoDB engine (M17). `aws-config` resolves credentials (shared profile or
# static access keys) + region and builds the SDK config; `aws-sdk-dynamodb` is
# the typed client (ListTables/DescribeTable/Scan/Query/GetItem/PutItem/
# DeleteItem/BatchWriteItem/ExecuteStatement). `behavior-version-latest` pins the
# SDK's default behaviors so the build is reproducible. The v1 SDK defaults to a
# pure-Rust rustls TLS stack (no OpenSSL system dep), consistent with the
# sqlx/redis driver picks, so we keep default features. `aws-credential-types`
# provides the static `Credentials` for the access-key auth mode.
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-sdk-dynamodb = { version = "1", features = ["behavior-version-latest"] }
aws-credential-types = { version = "1", features = ["hardcoded-credentials"] }
# MongoDB engine (M18). The official async driver runs on the tokio runtime
# already in the tree (Tauri's runtime), so the async `MongoConnection` methods
# await the driver directly â€” no spawn_blocking, mirroring the sqlx/redis/dynamo
# adapters. Default features give a pure-Rust rustls TLS stack (no OpenSSL system
# dep) and the SRV resolver (Atlas `mongodb+srv://`), consistent with the rest of
# the tree's rustls driver picks. `bson` (re-exported as `mongodb::bson`) is the
# BSON â‡„ value layer the document marshalling uses.
mongodb = "3"
# SQL Server engine (M21). `tiberius` is the pure-Rust TDS driver (there is no
# sqlx SQL Server backend on the 0.8 line). `default-features = false` drops the
# `native-tls` default in favour of `rustls` â€” a pure-Rust TLS stack (no OpenSSL
# system dependency), consistent with the sqlx/redis/mongo driver picks; cargo
# unifies on the single rustls already in the tree. `tds73` is the modern TDS
# protocol level; `chrono` gives `FromSql` conversions for the DATE/TIME/
# DATETIME2/DATETIMEOFFSET temporal types; `bigdecimal` decodes DECIMAL/NUMERIC
# to arbitrary precision (the CellValue precision contract). tiberius runs over
# any async transport; we drive it over a tokio `TcpStream` adapted with
# `tokio-util`'s compat shim (tiberius speaks futures-io, tokio speaks tokio-io).
tiberius = { version = "0.12", default-features = false, features = [
    "tds73",
    "rustls",
    "chrono",
] }
tokio-util = { version = "0.7", features = ["compat"] }
# tiberius query results arrive as a `futures_util::Stream`; the collectors
# (`into_first_result`/`into_results`) need the futures runtime glue.
futures-util = "0.3"
# Named directly so the mssql adapter can spell the `chrono` temporal types it
# decodes DATE/TIME/DATETIME2/DATETIMEOFFSET into (tiberius provides the FromSql
# impls behind its `chrono` feature). Already in the tree transitively via sqlx's
# chrono feature; cargo unifies on one 0.4 line so tiberius's impls apply.
chrono = "0.4"
# Cassandra engine (M19). The DataStax / ScyllaDB Rust driver (`scylla`) is
# async-native on the tokio runtime already in the tree (Tauri's runtime), so the
# `WideColumnConnection` methods await the session directly â€” no spawn_blocking,
# mirroring the sqlx/redis/dynamo/mongo adapters. Default features keep the driver
# pure-Rust (no OpenSSL system dep); native-protocol TLS arrives with a later M19
# subtask behind an explicit rustls feature.
scylla = "1.7"
tauri-plugin-os = "2"

[dev-dependencies]
tempfile = "3"
# `rt-multi-thread` is needed by the Postgres integration tests: sqlx's
# `#[tokio::test]` pool work and the connector both expect a real runtime. The
# library code itself runs on Tauri's runtime and needs only `sync`/`rt`.
tokio = { version = "1.52.3", features = ["sync", "rt", "rt-multi-thread", "macros"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
