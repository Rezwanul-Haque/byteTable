name: Feature request
description: Suggest a new capability or improvement for ByteTable.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape ByteTable. Fields below are pre-filled when you use
        the in-app **Report an issue** dialog — edit before you submit.

        For big features, please open the issue **before** sending a large PR so we can
        agree on the approach first (see
        [CONTRIBUTING.md](https://github.com/Rezwanul-Haque/byteTable/blob/main/CONTRIBUTING.md)).
        For open-ended ideas, a
        [Discussion](https://github.com/Rezwanul-Haque/byteTable/discussions) may fit better.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is painful or missing today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the ideal behavior, or a rough sketch of the UI.

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups or screenshots
      description: |
        Drag-and-drop or paste mockups, sketches, or references here — GitHub
        uploads them for you.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Auto-collected by ByteTable's "Report an issue" dialog (version, OS, engine, theme, locale). Edit if needed.

  - type: input
    id: handle
    attributes:
      label: GitHub handle (optional)
      description: So maintainers can follow up with you.
