<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="1024" height="1024" fill="none" role="img" aria-label="ByteTable app icon">
  <title>ByteTable</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23262e"></stop>
      <stop offset="1" stop-color="#16181d"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.16" r="0.85">
      <stop offset="0" stop-color="#2dd4a7" stop-opacity="0.20"></stop>
      <stop offset="0.6" stop-color="#2dd4a7" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <!-- 64-unit brand tile centered in an 80-unit canvas (80% content, ~10% transparent
       margin each side) so macOS renders it aligned with other Dock icons. -->
  <g transform="translate(8,8)">
    <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#tile)" stroke="#2c3039" stroke-width="1"></rect>
    <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#glow)"></rect>
    <g transform="translate(14,14) scale(1.5)">
      <rect x="3" y="4" width="8.5" height="4" rx="1.6" fill="#2dd4a7"></rect>
      <rect x="13.5" y="4" width="7.5" height="4" rx="1.6" fill="#2dd4a7" opacity="0.45"></rect>
      <rect x="3" y="10" width="18" height="4" rx="1.6" fill="#e3e6eb" opacity="0.55"></rect>
      <rect x="3" y="16" width="11" height="4" rx="1.6" fill="#e3e6eb" opacity="0.35"></rect>
      <rect x="16.5" y="16" width="4.5" height="4" rx="1.2" fill="#2dd4a7"></rect>
    </g>
  </g>
</svg>
