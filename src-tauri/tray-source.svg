    <rect x="3" y="4" width="8.5" height="4" rx="1.6" fill="#2dd4a7"/>
    <rect x="13.5" y="4" width="7.5" height="4" rx="1.6" fill="#2dd4a7" opacity="0.45"/>
    <rect x="3" y="10" width="18" height="4" rx="1.6" fill="#e3e6eb" opacity="0.75"/>
    <rect x="3" y="16" width="11" height="4" rx="1.6" fill="#e3e6eb" opacity="0.5"/>
    <rect x="16.5" y="16" width="4.5" height="4" rx="1.2" fill="#2dd4a7"/>
  </g>
</svg>
