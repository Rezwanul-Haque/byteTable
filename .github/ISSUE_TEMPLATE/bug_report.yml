name: Bug report
description: Report something that is broken or not working as expected.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Most fields below are pre-filled when you use
        ByteTable's in-app **Report an issue** dialog — edit anything before you submit.

        **Never paste real credentials, connection strings, or private data.**
        ByteTable is local-first; we can't see your machine and don't need your secrets.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This report contains no real credentials or private data.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? Include the engine, tab, and any error text.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: |
        Drag-and-drop or paste images / short screen recordings here — GitHub
        uploads them for you. Redact any sensitive values first.

  - type: input
    id: severity
    attributes:
      label: Severity
      description: One of Low / Medium / High / Critical. Pre-filled from the in-app dialog.
      placeholder: Medium
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Auto-collected by ByteTable's "Report an issue" dialog (version, OS, engine, theme, locale). Edit if needed.

  - type: input
    id: handle
    attributes:
      label: GitHub handle (optional)
      description: So maintainers can follow up with you.
